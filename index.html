<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATTHEW LOUIE // Undergraduate Researcher | Information Systems Technician</title>
    <style>
        :root {
            --bg: #010811;
            --navy: #0a192f;
            --accent: #38bdf8;
            --text: #e6f1ff;
            --glass: rgba(17, 34, 64, 0.8);
        }

        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; /* We handle the "scroll" via JS */
        }

        /* Full Screen Pages */
        .page {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
        }

        /* PAGE 1: SPLASH SCREEN */
        #splash {
            z-index: 2;
            background: linear-gradient(to bottom, var(--bg), var(--navy));
        }

        .intro-box {
            text-align: center;
            border-left: 2px solid var(--accent);
            padding: 20px 40px;
        }

        h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; }
        .bio-line { font-family: monospace; color: var(--accent); margin-top: 10px; font-size: 1.1rem; }

        .swipe-indicator {
            position: absolute;
            bottom: 40px;
            text-align: center;
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* PAGE 2: DASHBOARD */
        #dashboard {
            z-index: 1;
            transform: translateY(100%);
            background: var(--bg);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: auto 1fr 1fr;
            gap: 15px;
            padding: 40px 20px;
        }

        .dash-header {
            grid-column: span 2;
            text-align: left;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        /* Interactive Boxes */
        .box {
            background: var(--glass);
            border: 1px solid var(--navy);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: var(--text);
        }

        .box:hover {
            border-color: var(--accent);
            background: var(--navy);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .box h3 { font-family: monospace; font-size: 1.2rem; margin: 0; }
        .box p { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; text-transform: uppercase; }

        /* Expandable Modal Logic */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 8, 17, 0.95);
            z-index: 100;
            padding: 40px;
            overflow-y: auto;
        }

        .modal-content { max-width: 600px; margin: 0 auto; }
        .close-btn { color: var(--accent); cursor: pointer; font-family: monospace; margin-bottom: 20px; display: block; }

        /* Active classes for JS */
        .unlocked #splash { transform: translateY(-100%); }
        .unlocked #dashboard { transform: translateY(0); }

    </style>
</head>
<body id="body">

    <section id="splash" class="page">
        <div class="intro-box">
            <h1>MATTHEW LOUIE</h1>
            <div class="bio-line">UNDERGRADUATE RESEARCHER || INFORMATION SYSTEMS TECHNICIAN</div>
        </div>
        <div class="swipe-indicator" onclick="unlock()">
            <div style="font-size: 0.8rem; font-family: monospace; margin-bottom: 10px;">CLICK HERE</div>
            <div style="font-size: 2rem;">↑</div>
        </div>
    </section>

    <section id="dashboard" class="page">
        <div class="dash-header">
            <div style="font-family: monospace; color: var(--accent); font-size: 0.8rem;">DASHBOARD</div>
        </div>

        <div class="box" onclick="openModal('edu')">
            <h3>EDUCATION</h3>
            <p></p>
        </div>

        <div class="box" onclick="openModal('navy')">
            <h3>NAVY CAREER</h3>
            <p></p>
        </div>

        <div class="box" onclick="openModal('research')">
            <h3>RESEARCH</h3>
            <p></p>
           
        </div>

        <div class="box" onclick="openModal('contact')">
            <h3>CONTACT ME</h3>
           <p></p>
        </div>
    </section>

    <div id="modal" class="modal">
        <span class="close-btn" onclick="closeModal()">[ BACK TO MENU ]</span>
        <div id="modal-body" class="modal-content"></div>
    </div>

    <script>
        // HANDLE SWIPE / UNLOCK
        let startY;
        document.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        document.addEventListener('touchend', e => {
            if(startY - e.changedTouches[0].pageY > 50) unlock();
        });

        function unlock() {
            document.getElementById('body').classList.add('unlocked');
        }

        // HANDLE MODALS
        const data = {
            edu: "<h2>Education</h2><p><strong>B.S. Information Systems with a certificate in Applied Business Database Analytics</strong><br>Focused on Business Data Integration and Systems Analysis.</p><ul><li>Data Security</li><li>Systems Design</li><li>Business Processes</li></ul>",
            navy: "<h2>Navy Roles</h2> <details>
    <summary>MHS Operations Manager</summary>
    <div class="exp-content">Oversight for MHS Network Rollout. Managed relations between departments, coordinated logistic and communication, established technical connections.</div>,
           <summary>Information Helpdesk Lead</summary>
    <div class="exp-content">Served as the Lead Technician for a 150-person department, overseeing cross-departmental support and ensuring 100% mission-critical system uptime..</div>,
            research: <summary>Analyzing correlation between sleep schedules and mental health disorders</summary>
        =   <div class="exp-content">.</div>"<h2>Developing local machine learning models to analyze the correlation between REM/NREM sleep cycles and mental health disorders such as anxiety and PTSD.</p>
                <p> </p>"
                <summary>IMPACT LAB at SCAI</summary>
    <div class="exp-content">Currently working on projects to include health informatics in business applications for Dr. Sandeep Gupta's IMAPCT LAB at School of Computing and Augmented Intelligence ASU.</div>,
            contact: "<h2>Contact</h2><p>Looking for More? Please reach out at the links below.</p><p>Email: <a href='mailto:mlouie1@asu.edu'>mlouie1@asu.edu</a></p><p><a href='https://www.https://www.linkedin.com/in/matthewlouieprofessional/' target='_blank'>LinkedIn</a> // <a href='https://github.com' target='_blank'>GitHub</a></p>"
        };

        function openModal(key) {
            document.getElementById('modal-body').innerHTML = data[key];
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
